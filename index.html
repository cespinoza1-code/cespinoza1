<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitor de Contenedores</title>
<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
</head>
<body>

<h1>MONITOREO Y TRAZADO DE CONTENEDORES</h1>

<div class="acciones">

  <button id="btnLimpiar">LIMPIAR RUTA</button>
</div>

<div class="panel">

  <div class="barra"><div id="relleno"></div></div>
  <p><span id="nivelTexto">--</span></p>
</div>

<div id="contenedores"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

</html>
